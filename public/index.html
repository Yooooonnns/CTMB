<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YAZAKI — Accueil</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f5f5;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 40px 20px;
    }

    header { text-align: center; }
    .logo img { height: 160px; width: auto; display: block; margin: 0 auto; }
    .logo { font-size: 28px; font-weight: 900; color: #b71c1c; letter-spacing: .1em; }
    .sub  { font-size: 14px; color: #757575; margin-top: 10px; letter-spacing: .04em; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 280px));
      gap: 20px;
      justify-content: center;
      width: 100%;
      max-width: 1200px;
    }

    .screen-card {
      background: #fff;
      border-radius: 14px;
      border: 1px solid #e0e0e0;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .screen-card .title { font-size: 15px; font-weight: 700; color: #212121; }
    .screen-card .desc  { font-size: 13px; color: #757575; line-height: 1.5; flex: 1; }

    .btn-open {
      display: inline-block;
      margin-top: 8px;
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      text-align: center;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }
    .btn-blue   { background: #1565c0; color: #fff; }
    .btn-dark   { background: #212121; color: #fff; }
    .btn-green  { background: #2e7d32; color: #fff; }
    .btn-purple { background: #6a1b9a; color: #fff; }

    .sel-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .sel-row label {
      font-size: 12px;
      color: #757575;
      font-weight: 600;
      white-space: nowrap;
      min-width: 36px;
    }
    .sel-row select {
      flex: 1;
      padding: 7px 10px;
      border: 1px solid #e0e0e0;
      border-radius: 7px;
      font-size: 13px;
      font-family: inherit;
      background: #fafafa;
      color: #212121;
    }


  </style>
</head>
<body>

  <header>
    <div class="logo"><img src="/logo.jpg" alt="YAZAKI"></div>
    <div class="sub">Commande Chaîne — Sélectionnez un écran à ouvrir</div>
  </header>

  <div class="grid">

    <!-- Supervision -->
    <div class="screen-card">
      <div class="title">Supervision</div>
      <a href="/supervision.html" target="_blank" class="btn-open btn-purple">Ouvrir</a>
    </div>

    <!-- Administration -->
    <div class="screen-card">
      <div class="title">Administration</div>
      <a href="/admin.html" target="_blank" class="btn-open btn-blue">Ouvrir</a>
    </div>

    <!-- Operator -->
    <div class="screen-card">
      <div class="title">Écran opérateur</div>
      <div class="sel-row">
        <label>Ligne</label>
        <select id="sel-op-line">
          <option value="">Chargement…</option>
        </select>
      </div>
      <div class="sel-row">
        <label>Poste</label>
        <select id="sel-op-post">
          <option value="1">1</option><option value="2">2</option>
          <option value="3">3</option><option value="4">4</option>
          <option value="5">5</option><option value="6">6</option>
          <option value="7">7</option><option value="8">8</option>
        </select>
      </div>
      <button class="btn-open btn-dark" onclick="openScreen('op')">Ouvrir</button>
    </div>

    <!-- LED CTMB -->
    <div class="screen-card">
      <div class="title">Afficheur LED (CTMB)</div>
      <div class="sel-row">
        <label>Ligne</label>
        <select id="sel-led-line">
          <option value="">Chargement…</option>
        </select>
      </div>
      <div class="sel-row">
        <label>Poste</label>
        <select id="sel-led-post">
          <option value="1">1</option><option value="2">2</option>
          <option value="3">3</option><option value="4">4</option>
          <option value="5">5</option><option value="6">6</option>
          <option value="7">7</option><option value="8">8</option>
        </select>
      </div>
      <button class="btn-open btn-green" onclick="openScreen('led')">Ouvrir</button>
    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const HOST  = window.location.host;
    const PROTO = window.location.protocol;


    var linesCache = [];

    // Load lines into both selectors
    async function loadLines() {
      try {
        const lines = await fetch('/api/lines').then(r => r.json());
        linesCache = lines;
        ['sel-op-line', 'sel-led-line'].forEach(id => {
          const sel = document.getElementById(id);
          const prev = sel.value;
          sel.innerHTML = lines.map(l =>
            '<option value="' + l.id + '" data-posts="' + l.posts + '">' + l.name + '</option>'
          ).join('') || '<option value="1" data-posts="8">Ligne 1</option>';
          // restore previous selection if still valid
          if (prev && [...sel.options].some(o => o.value === prev)) sel.value = prev;
          else if (lines.length) sel.value = lines[0].id;
          updatePostOptions(sel);
        });
      } catch {
        ['sel-op-line', 'sel-led-line'].forEach(id => {
          document.getElementById(id).innerHTML = '<option value="1" data-posts="8">Ligne 1</option>';
        });
      }
    }

    function updatePostOptions(lineSel) {
      const chosen = lineSel.options[lineSel.selectedIndex];
      const nPosts = chosen ? (+chosen.dataset.posts || 8) : 8;
      const postSelId = lineSel.id === 'sel-op-line' ? 'sel-op-post' : 'sel-led-post';
      const postSel   = document.getElementById(postSelId);
      const prevPost  = postSel.value;
      postSel.innerHTML = Array.from({length: nPosts}, (_, i) =>
        '<option value="' + (i+1) + '">' + (i+1) + '</option>'
      ).join('');
      if (+prevPost >= 1 && +prevPost <= nPosts) postSel.value = prevPost;
    }

    function getOpUrl() {
      const line = document.getElementById('sel-op-line').value  || '1';
      const post = document.getElementById('sel-op-post').value  || '1';
      return PROTO + '//' + HOST + '/line/' + line + '/operator.html?post=' + post;
    }

    function getLedUrl() {
      const line = document.getElementById('sel-led-line').value || '1';
      const post = document.getElementById('sel-led-post').value || '1';
      return PROTO + '//' + HOST + '/line/' + line + '/led.html?post=' + post;
    }

    document.getElementById('sel-op-line').addEventListener('change', function() {
      updatePostOptions(this);
    });
    document.getElementById('sel-led-line').addEventListener('change', function() {
      updatePostOptions(this);
    });

    function openScreen(type) {
      if (type === 'op') {
        window.open(getOpUrl(), '_blank', 'noopener');
      } else {
        // POST to the server which relays ctmb:open via Socket.io to the Electron display app.
        // Falls back to browser LED page if the app is not connected.
        const line = +document.getElementById('sel-led-line').value || 1;
        const post = +document.getElementById('sel-led-post').value || 1;
        fetch('/api/ctmb/open', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ lineId: line, postId: post })
        })
        .catch(() => {});
      }
    }

    // Auto-refresh when lines change (e.g. new line added from supervision)
    const socket = io();
    socket.on('lines:updated', loadLines);
    socket.on('supervision:update', loadLines);

    loadLines();
  </script>

</body>
</html>
